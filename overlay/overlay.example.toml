# Saitenka overlay settings — copy to ~/.config/saitenka/overlay.toml
#
# Lives in its own XDG dir (not mixed into mpv.conf or the animecards rig). Anything here is a
# DEFAULT; an explicit CLI flag to mpv_reader.py overrides it. Point elsewhere with --config or
# $SAITENKA_CONFIG. Dictionaries are imported ONCE into a consolidated database
# (~/.local/share/saitenka/dictionaries.sqlite) by `saitenka-overlay import <dir-with-zips>`; the lists
# below are dictionary TITLES resolved against that DB (not file paths). Import first, then reference.

slang = "ja,jpn,jp"        # primary (Japanese) subtitle languages, priority order
tip_height = 0.4           # max tooltip height as a fraction of the video height (default 0.4)
translate_key = "t"        # toggle the official EN translation
pause_on_tooltip = false   # auto-pause playback while a tooltip is shown (resumes when it hides)

# Subtitle navigation keys (Stage 4 — crucial feature).
sub_prev_key   = "Alt+LEFT"    # jump to the PREVIOUS subtitle line (sub-seek -1)
sub_next_key   = "Alt+RIGHT"   # jump to the NEXT subtitle line (sub-seek  1)
sub_replay_key = "Alt+DOWN"    # replay the CURRENT subtitle line from its start (sub-seek 0)
# Sub-delay nudges z / Z / x (mpv defaults, kept working via our overlay keybind pass-through).

# mpv coexistence (Stage 16). All optional.
# mpv_path      = "/Applications/mpv.app/Contents/MacOS/mpv"  # override auto-discovery
# mpv_socket    = "/tmp/mpv-socket"   # default socket for `saitenka-overlay attach` (share with
#                                     # mpv_websocket/animecards — mpv allows many IPC clients)
# overlay_id_base = 1  # shift our OSD overlay ids (we use 6 starting here) if another mpv script
#                      # already owns ids 1..6; 1 = default, no shift.

# Definition dictionaries by TITLE, in tooltip order (first = top). The tooltip scrolls, so include as
# many as you like — the DB keeps RAM low regardless of size. Titles are the Yomitan dictionary names
# (see `saitenka-overlay doctor`, which lists what's imported). Import them first:
#   saitenka-overlay import ~/yomitan-dicts    # builds them into the DB and fills these lists for you
dicts = [
  "Bilingual Dict",
  "Monolingual Dict A",
  "Monolingual Dict B",
  # add as many definition dictionaries as you like — the tooltip scrolls.
  # grammar / name / kanji dictionaries can go here too.
]

# Frequency dictionaries → green pills (order preserved; harmonic-blended). Titles, not paths.
freq = [
  "Frequency General",
  "Frequency Media",
  "Frequency Novels",
]

# Pitch-accent dictionaries → purple pills. Titles, not paths.
pitch = [
  "Pitch Accent",
]

# Known-word source for FSRS-aware coloring: Anki decks -> fields (read via AnkiConnect).
[known]
"Saitenka::Known" = ["Expression"]

# One-key mining target.
[mine]
# Mining is ON whenever this [mine] table is present (Ctrl+m mines the hovered word). Set
# enabled = false to keep the config but turn mining off; --no-mine does the same for one run.
# When mining (or Anki-backed known-word coloring) is on, Saitenka starts Anki for you if it's closed.
enabled = true
deck = "Saitenka::Mining"
model = "Lapis"
key = "Ctrl+m"
all_key = "Shift+m"
preview_key = "p"

# AnkiConnect endpoint — only needed if you changed AnkiConnect's defaults (Anki → Tools → Add-ons →
# AnkiConnect → Config: webBindPort / webBindAddress / apiKey). Stock default is 127.0.0.1:8765, no key.
# [anki]
# url = "http://127.0.0.1:8765"   # or set host/port separately: host = "127.0.0.1", port = 8765
# api_key = "..."                 # only if you set an AnkiConnect apiKey

# jimaku.cc subtitle fetch for attach/plugin mode. `attach` first selects an embedded JP track;
# only when the file has NO Japanese subs does it fetch from jimaku (so this is safe to leave on).
# API key resolution: this `key` > $JIMAKU_API_KEY > macOS Keychain. Prefer the Keychain —
# `saitenka-overlay set-jimaku-key` — because a GUI-launched (plugin-mode) mpv can read it, while a
# shell env var (and, less securely, a key written here in plaintext) it can only read from a terminal.
[jimaku]
enabled = true
# key = "..."       # last resort — plaintext; Keychain (set-jimaku-key) is preferred
resync = true       # auto-resync fetched subs to the video (alass/ffsubsync) — recommended
# force = true      # prefer jimaku OVER the embedded JP track (mistimed/wrong baked-in subs);
#                   # falls back to the embedded track if the fetch fails. Same as --jimaku-force.

# Runtime tracing/metrics (OpenTelemetry) — OFF by default, and requires the `observability` extra
# (`saitenka-overlay[observability]`) even when enabled here. Local-only: a Chrome Trace Format file
# under the cache dir, no backend/gRPC. See RUNNING.md "Telemetry".
# [telemetry]
# enabled = true
# export_dir = "~/custom/telemetry"   # default: <cache dir>/telemetry
